name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a feature idea? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem would this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: dropdown
    id: platforms
    attributes:
      label: Which platforms should this affect?
      multiple: true
      options:
        - Bukkit/Spigot/Paper
        - Fabric
        - Forge
        - NeoForge
        - All platforms
        - Common (platform-agnostic)
    validations:
      required: true
