version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore
      - deps
    commit-message:
      prefix: "chore(deps)"

  # Gradle (root)
  - package-ecosystem: gradle
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore
      - deps
    commit-message:
      prefix: "chore(deps)"
